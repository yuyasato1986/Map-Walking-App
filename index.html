<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バーチャル散歩: バーチャルお散歩体験</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="app-container">
        <button id="sidebar-toggle" class="mobile-only">
            <i class="fa-solid fa-bars"></i>
        </button>
        <!-- Sidebar / Control Panel -->
        <aside id="sidebar">
            <div class="header">
                <h1>バーチャル散歩</h1>
                <p>バーチャルお散歩体験</p>
            </div>


            <div class="route-controls">
                <div class="input-group">
                    <i class="fa-solid fa-location-dot icon-origin"></i>
                    <input type="text" id="origin-input" placeholder="出発点: 例「東京駅」">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-flag-checkered icon-dest"></i>
                    <input type="text" id="destination-input" placeholder="目的地: 例「皇居」">
                </div>
                <button id="calculate-route-btn" class="primary-btn">
                    <i class="fa-solid fa-route"></i> ルートを取得
                </button>

                <div class="input-group year-selector">
                    <i class="fa-solid fa-clock-rotate-left icon-year"></i>
                    <select id="year-select">
                        <!-- Options will be populated via JavaScript or hardcoded -->
                        <option value="2026">2026年</option>
                        <option value="2025">2025年</option>
                        <option value="2024">2024年</option>
                        <option value="2023">2023年</option>
                        <option value="2022">2022年</option>
                        <option value="2021">2021年</option>
                        <option value="2020">2020年</option>
                        <option value="2019">2019年</option>
                        <option value="2018">2018年</option>
                        <option value="2017">2017年</option>
                        <option value="2016">2016年</option>
                        <option value="2015">2015年</option>
                        <option value="2014">2014年</option>
                        <option value="2013">2013年</option>
                        <option value="2012">2012年</option>
                        <option value="2011">2011年</option>
                        <option value="2010">2010年</option>
                        <option value="2009">2009年</option>
                        <option value="2008">2008年</option>
                        <option value="2007" selected>2007年</option>
                    </select>
                </div>
            </div>

            <div class="playback-controls" id="playback-controls" style="display: none;">
                <div class="control-buttons">
                    <button id="play-pause-btn" class="control-btn" title="再生/一時停止"><i
                            class="fa-solid fa-play"></i></button>
                    <button id="reset-btn" class="control-btn" title="リセット"><i
                            class="fa-solid fa-rotate-left"></i></button>
                </div>
                <div class="speed-control">
                    <label for="speed-slider">速度</label>
                    <input type="range" id="speed-slider" min="1" max="10" value="3">
                </div>
            </div>


            <div id="mini-map"></div>
        </aside>

        <!-- Main Viewport -->
        <main id="viewport">
            <div id="street-view"></div>
            <div id="loading-overlay" class="hidden">
                <div class="spinner"></div>
                <p>ルートを読み込み中...</p>
            </div>
        </main>
    </div>

    <!-- Script loading: Order is important -->
    <script src="config.js"></script>
    <script src="main.js"></script>
</body>

</html>
